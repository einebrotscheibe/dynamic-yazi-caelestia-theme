# }}}


# File-specific styles {{{

[filetype]
rules = [
	# directories
	{ url = "*/", fg = "{{PRIMARY}}"},
    # files
	{ url = "*", fg = "{{PRIMARY}}"}
]

# }}}


# Icons: {{{

[icon]
conds = [
	# Special files
	{ if = "orphan", text = "п„§"},
	{ if = "link", text = "п’Ѓ"},
	{ if = "sticky", text = "п‚Ќ"},

	# Fallback
	{ if = "dir & hovered", text = "о—ѕ", fg = "{{PRIMARY}}"},
	{ if = "dir", text = "о—ї", fg = "{{PRIMARY}}"},
	{ if = "exec", text = "п’‰", fg = "{{PRIMARY}}"},
	{ if = "!dir", text = "п…›", fg = "{{PRIMARY}}"}
]

globs = []
dirs  = []
files = []
exts = []

